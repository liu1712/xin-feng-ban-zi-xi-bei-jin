<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时钟</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Noto+Sans+SC:wght@300;400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            overflow: hidden;
            background-image: url('2.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }

        .time-container {
            text-align: center;
            padding: 20px 50px;
            position: absolute;
            right: 15%;
            top: 50%;
            transform: translateY(-50%);
            cursor: move;
            user-select: none;
        }

        .time-container.dragging {
            opacity: 0.7;
        }

        .time-display {
            font-family: 'Poppins', 'Noto Sans SC', sans-serif;
            font-size: 7rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 
                0 4px 8px rgba(0, 0, 0, 0.3),
                0 0 20px rgba(255, 255, 255, 0.5),
                0 0 40px rgba(200, 200, 255, 0.3);
            letter-spacing: 0.05em;
            line-height: 1;
        }

        .date-display {
            font-family: 'Poppins', 'Noto Sans SC', sans-serif;
            font-size: 2rem;
            font-weight: 300;
            color: #e0e0e0;
            margin-top: 15px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.02em;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.7);
            background: rgba(0, 0, 0, 0.3);
            color: #ffffff;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #ffffff;
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            .time-display {
                font-size: 3.5rem;
            }
            .date-display {
                font-size: 1.2rem;
            }
            .time-container {
                padding: 15px 30px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreen-btn" title="全屏">⛶</button>
    <div class="time-container">
        <div class="time-display" id="time">00:00:00</div>
        <div class="date-display" id="date"></div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('time').textContent = `${hours}:${minutes}:${seconds}`;

            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const day = now.getDate();
            const weekday = weekdays[now.getDay()];
            document.getElementById('date').textContent = `${year}年${month}月${day}日 星期${weekday}`;
        }

        updateTime();
        setInterval(updateTime, 1000);

        const fullscreenBtn = document.getElementById('fullscreen-btn');
        
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                fullscreenBtn.textContent = '✕';
            } else {
                document.exitFullscreen();
                fullscreenBtn.textContent = '⛶';
            }
        });

        document.addEventListener('fullscreenchange', () => {
            fullscreenBtn.textContent = document.fullscreenElement ? '✕' : '⛶';
        });

        const timeContainer = document.querySelector('.time-container');
        let isDragging = false;
        let currentX;
        let currentY;
        let initialX;
        let initialY;
        let xOffset = 0;
        let yOffset = 0;

        function setInitialPosition() {
            const rect = timeContainer.getBoundingClientRect();
            xOffset = rect.left;
            yOffset = rect.top;
            timeContainer.style.transform = 'translate(0, 0)';
            timeContainer.style.right = 'auto';
            timeContainer.style.top = 'auto';
            timeContainer.style.left = xOffset + 'px';
            timeContainer.style.top = yOffset + 'px';
        }

        setTimeout(setInitialPosition, 100);

        timeContainer.addEventListener('mousedown', dragStart);
        document.addEventListener('mousemove', drag);
        document.addEventListener('mouseup', dragEnd);

        function dragStart(e) {
            initialX = e.clientX - xOffset;
            initialY = e.clientY - yOffset;
            isDragging = true;
            timeContainer.classList.add('dragging');
        }

        function drag(e) {
            if (isDragging) {
                e.preventDefault();
                currentX = e.clientX - initialX;
                currentY = e.clientY - initialY;
                xOffset = currentX;
                yOffset = currentY;
                timeContainer.style.left = currentX + 'px';
                timeContainer.style.top = currentY + 'px';
            }
        }

        function dragEnd() {
            isDragging = false;
            timeContainer.classList.remove('dragging');
        }
    </script>
</body>
</html>
